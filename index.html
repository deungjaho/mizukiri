<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>水切り</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='none' stroke='%232c2416' stroke-width='2.5'/><circle cx='16' cy='16' r='7' fill='%232c2416'/></svg>">
<style>
/* Reset */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f7f4ed;
  --surface: #fffef9;
  --border: #d9d2c5;
  --line: #c8c0b2;
  --text: #2c2416;
  --text-dim: #a09888;
  --accent: #3a5660;
  --x-color: #2b4a3a;
  --o-color: #b84545;
  --win-color: #b8860b;
  --radius: 2px;
  --shadow: 0 1px 3px rgba(44, 36, 22, 0.06), 0 2px 12px rgba(44, 36, 22, 0.04);
  --transition: 0.3s ease;
}

html, body { height: 100%; overflow: hidden; overscroll-behavior: none; }

body {
  font-family: "Songti SC", "Hiragino Mincho Pro", "YuMincho", serif;
  background-color: #f7f4ed;
  background-image:
    radial-gradient(ellipse at 30% 20%, rgba(200,185,165,0.18) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 80%, rgba(185,170,150,0.15) 0%, transparent 55%),
    repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(175,165,145,0.06) 2px, rgba(175,165,145,0.06) 4px
    );
  background-size: 100% 100%, 100% 100%, 100% 4px;
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}

/* Screens */
.screen {
  display: none;
  flex-direction: column;
  align-items: center;
  width: 100%;
  max-width: 520px;
  padding: 24px;
}
.screen.active { display: flex; }

/* Mode screen */
#mode-screen h1 {
  width: 100%;
  font-size: 2.4rem;
  font-weight: 400;
  color: var(--text);
  margin-bottom: 6px;
  text-align: center;
  text-indent: 0.08em;
}

.subtitle {
  color: var(--text-dim);
  font-size: 0.85rem;
  margin-bottom: 48px;
  letter-spacing: 0.05em;
  line-height: 1.8;
  text-align: center;
}

.mode-buttons { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 280px; }

.mode-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 15px 20px;
  border: 1px solid var(--line);
  background: transparent;
  color: var(--text);
  font-size: 0.95rem;
  line-height: 1.4;
  cursor: pointer;
  transition: all var(--transition);
  font-family: inherit;
  letter-spacing: 0.1em;
}

.mode-btn:hover {
  border-color: var(--text);
  background: rgba(44,36,22,0.03);
}

.mode-btn.primary {
  border-color: var(--text);
  border-width: 1.5px;
  background: var(--text);
  color: #fff;
  letter-spacing: 0.12em;
}

.mode-btn.primary:hover { background: #3d3628; border-color: #3d3628; }
.mode-btn:active, .modal-btn:active { transform: scale(0.97); }

/* Game screen */
#game-screen { max-width: 760px; }

.remote-bar {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 4px 0 8px;
  font-size: 0.8rem;
  color: var(--text-dim);
  letter-spacing: 0.05em;
}

.remote-bar .turn-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  display: inline-block;
}

.remote-bar .turn-dot.x-turn { background: var(--x-color); }
.remote-bar .turn-dot.o-turn { background: var(--o-color); }

.game-layout {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  width: 100%;
}

.game-main {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  width: 100%;
}

.side-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.side-col-right {
  transform: rotate(180deg);
  display: none;
}

.board-wrapper {
  grid-column: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

.connection-badge {
  margin-top: 4px;
}

.side-btn {
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 0.68rem;
  cursor: pointer;
  font-family: inherit;
  letter-spacing: 0.06em;
  writing-mode: vertical-rl;
  padding: 4px 2px;
  transition: color var(--transition);
}

.side-btn:hover { color: var(--text); }
.side-btn:active { opacity: 0.6; }

button:focus-visible { outline: 2px solid var(--text); outline-offset: 2px; }

.connection-badge {
  font-size: 0.55rem;
  padding: 2px 4px;
  background: var(--surface);
  color: var(--text-dim);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 3px;
  letter-spacing: 0.03em;
  white-space: nowrap;
  writing-mode: horizontal-tb;
  position: fixed;
  top: 12px;
  right: 12px;
  z-index: 100;
}

.connection-badge .dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: #6b9e6b;
}

/* Player panels */
.player-panel {
  flex: 0 0 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding: 12px 4px;
  transition: opacity 0.4s ease;
}

.player-panel.inactive { opacity: 0.35; }

.player-panel.winner-flash {
  animation: win-flash 0.6s ease-out;
}
@keyframes win-flash {
  0%   { box-shadow: 0 0 0 rgba(184,134,11,0.6); }
  50%  { box-shadow: 0 0 20px rgba(184,134,11,0.3); }
  100% { box-shadow: 0 0 0 rgba(184,134,11,0); }
}

.player-panel.flip {
  transform: rotate(180deg);
}

.player-symbol {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
}

.player-symbol.x-sym::before {
  content: '';
  display: block;
  width: 22px; height: 22px;
  border: 3.5px solid var(--x-color);
}

.player-symbol.o-sym::before {
  content: '';
  display: block;
  width: 22px; height: 22px;
  border: 3.5px solid var(--o-color);
  border-radius: 50%;
}

.player-label {
  font-size: 0.7rem;
  color: var(--text-dim);
  letter-spacing: 0.05em;
  text-align: center;
  line-height: 1.4;
}

.score {
  font-size: 1.2rem;
  font-weight: 400;
  color: var(--text);
  font-family: "Helvetica Neue", "Hiragino Sans", sans-serif;
}

/* Move queue */
.move-queue { display: flex; gap: 5px; }

.move-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--line);
  transition: all 0.3s ease;
}

.move-dot.filled-x { background: var(--x-color); }
.move-dot.filled-o { background: var(--o-color); }
.move-dot.oldest { opacity: 0.25; }

/* Board */
.status-text {
  font-size: 0.85rem;
  font-weight: 400;
  text-align: center;
  color: var(--text);
  letter-spacing: 0.05em;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 24px;
}

.status-text .turn-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  display: inline-block;
}

.status-text .turn-dot.x-turn { background: var(--x-color); }
.status-text .turn-dot.o-turn { background: var(--o-color); }

.board {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  gap: 1px;
  width: 100%;
  max-width: 300px;
  aspect-ratio: 1;
  background: var(--line);
  border: 1px solid var(--line);
  box-shadow: var(--shadow);
}

.cell {
  background: var(--surface);
  cursor: pointer;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background var(--transition);
}

.cell:hover:not(.taken):not(.blocked) {
  background: #f5f2ec;
}

.cell.taken { cursor: default; }
.cell.blocked { cursor: default; }

/* X mark: hollow square */
.cell.x-mark::before {
  content: '';
  position: absolute;
  width: 52%;
  height: 52%;
  border: 3.5px solid var(--x-color);
}

/* O mark */
.cell.o-mark::before {
  content: '';
  position: absolute;
  width: 52%;
  height: 52%;
  border: 3.5px solid var(--o-color);
  border-radius: 50%;
}

/* Oldest piece */
.cell.oldest-x::before { opacity: 0.2; }
.cell.oldest-o::before { opacity: 0.2; }

/* Placement */
.cell.just-placed::before {
  animation: piece-in 0.15s ease-out;
}
@keyframes piece-in {
  0%   { transform: scale(0.8); opacity: 0.4; }
  100% { transform: scale(1); opacity: 1; }
}

/* Win state */
.cell.win-cell.x-mark::before {
  border-color: var(--win-color);
}

.cell.win-cell.o-mark::before {
  border-color: var(--win-color);
}

/* Placement */

/* Hover preview */
#game-screen[data-myturn="true"][data-turn="X"] .cell:not(.taken):not(.blocked):hover::before {
  content: '';
  position: absolute;
  opacity: 0.12;
  pointer-events: none;
  width: 44%;
  height: 44%;
  border: 3px solid var(--x-color);
}

#game-screen[data-myturn="true"][data-turn="O"] .cell:not(.taken):not(.blocked):hover::before {
  content: '';
  position: absolute;
  opacity: 0.12;
  pointer-events: none;
  width: 44%;
  height: 44%;
  border: 3px solid var(--o-color);
  border-radius: 50%;
  background: none;
}

/* Modal */
.modal-overlay {
  display: flex;
  position: fixed;
  inset: 0;
  background: rgba(44, 36, 22, 0.35);
  z-index: 100;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease;
}

.modal-overlay.active {
  opacity: 1;
  pointer-events: auto;
}

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 40px 36px;
  max-width: 440px;
  width: 92%;
}

.modal h2 {
  font-size: 1.1rem;
  font-weight: 400;
  letter-spacing: 0.1em;
  margin-bottom: 8px;
  text-align: center;
}

.modal p {
  color: var(--text-dim);
  font-size: 0.8rem;
  margin-bottom: 16px;
  line-height: 1.6;
  letter-spacing: 0.04em;
  text-align: center;
}

.modal textarea {
  width: 100%;
  height: 72px;
  background: #faf8f5;
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px;
  font-family: "SF Mono", "Menlo", monospace;
  font-size: 0.7rem;
  resize: vertical;
  word-break: break-all;
  letter-spacing: 0.02em;
}

.modal textarea:focus { outline: none; border-color: var(--text); }

.modal .step-indicator {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-bottom: 18px;
}

.modal .step {
  width: 24px; height: 24px;
  border-radius: 50%;
  border: 1px solid var(--border);
  color: var(--text-dim);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  font-family: "Helvetica Neue", sans-serif;
}

.modal .step.active {
  border-color: var(--text);
  background: var(--text);
  color: #fff;
}

.modal .step.done {
  border-color: var(--text);
  background: var(--text);
  color: #fff;
}

.modal .step-line { width: 16px; height: 1px; background: var(--border); }

.modal .btn-row {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-top: 28px;
  flex-wrap: wrap;
}

.modal-btn {
  padding: 8px 18px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 0.8rem;
  cursor: pointer;
  font-family: inherit;
  letter-spacing: 0.05em;
  transition: all var(--transition);
}

.modal-btn:hover {
  border-color: var(--text);
  background: #faf8f5;
}

.modal-btn.primary {
  border-color: var(--text);
  background: var(--text);
  color: #fff;
}

.modal-btn.primary:hover {
  background: #3d3628;
}

.modal-btn-sm {
  font-size: 0.75rem;
  padding: 6px 16px;
  color: var(--text-dim);
  border-color: transparent;
}

.modal-btn-sm:hover {
  color: var(--text);
  border-color: var(--border);
}

.confirm-dialog {
  text-align: center;
  padding: 28px 24px;
  max-width: 320px;
}
.confirm-dialog p { margin-bottom: 20px; }

.waiting-room-code {
  font-size: 2.4rem;
  font-weight: 400;
  letter-spacing: 0.3em;
  padding-left: 0.3em; /* Offset trailing letter-spacing to center text */
  margin: 8px 0 18px;
  min-height: 3rem;
}

.waiting-qr-frame {
  display: inline-block;
  padding: 12px;
  border: 1px solid var(--line);
  margin-bottom: 10px;
}

.waiting-qr-frame img {
  width: 200px;
  height: 200px;
  display: block;
}

.waiting-hint {
  color: var(--text-dim);
  font-size: 0.75rem;
  letter-spacing: 0.05em;
  margin-bottom: 0;
}

.remote-row {
  display: flex;
  gap: 14px;
  justify-content: center;
  align-items: stretch;
  margin-bottom: 20px;
}

.remote-row .icon-btn {
  flex: 0 0 56px;
  height: 48px;
}

#room-input {
  flex: 1;
  max-width: 280px;
  height: 48px;
}

.remote-row .modal-btn {
  padding: 9px 24px;
  font-size: 0.9rem;
  width: 140px;
  flex: 0 0 auto;
  background: transparent;
  border: 1px solid var(--text);
  color: var(--text);
}

.remote-row .modal-btn:hover {
  background: rgba(44,36,22,0.04);
}

.remote-row .modal-btn.primary {
  font-size: 0.9rem;
  padding: 9px 24px;
  width: 140px;
  flex: 0 0 auto;
  background: var(--text);
  border-color: var(--text);
  color: #fff;
}

.remote-row .modal-btn.primary:hover {
  background: #3d3628;
  border-color: #3d3628;
}

.icon-btn {
  width: 42px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color var(--transition);
}

.icon-btn:hover {
  border-color: var(--text);
}

#room-input {
  padding: 0 6px;
  border: none;
  border-bottom: 2px solid var(--line);
  background: transparent;
  font-size: 1.1rem;
  text-align: center;
  letter-spacing: 0.3em;
  font-family: inherit;
  color: var(--text);
}

#room-input:focus {
  outline: none;
  border-bottom-color: var(--text);
}

.copy-notify {
  position: fixed;
  top: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: #fff;
  padding: 8px 20px;
  font-size: 0.75rem;
  letter-spacing: 0.05em;
  z-index: 200;
  animation: notify-in 0.3s ease-out, notify-out 0.3s ease-in 1.5s forwards;
  pointer-events: none;
}

@keyframes notify-in {
  from { opacity: 0; transform: translateX(-50%) translateY(-12px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}
@keyframes notify-out { from { opacity: 1; } to { opacity: 0; } }

/* Responsive layout */
@media (min-width: 521px) {
  .side-col-right { display: none !important; }

  .game-layout {
    flex-direction: row;
    align-items: center;
    gap: 12px;
  }

  .player-panel {
    flex: 0 0 110px;
  }

  .player-symbol { width: 48px; height: 48px; }
  .player-symbol.x-sym::before,
  .player-symbol.o-sym::before { width: 38px; height: 38px; border-width: 4px; }
  .player-label { font-size: 1rem; }
  .status-text { font-size: 1.25rem; }
  .modal h2 { font-size: 1.4rem; }
  .modal p { font-size: 1rem; }
  .modal-btn { font-size: 1rem; padding: 10px 24px; }
  #room-input { font-size: 1.4rem; }
  .mode-btn { font-size: 1.2rem; padding: 18px 28px; }
  #mode-screen h1 { font-size: 6rem; }
  .subtitle { font-size: 1.25rem; }
  .side-btn { writing-mode: horizontal-tb; font-size: 1rem; padding: 5px 8px; }
  .score { font-size: 1.6rem; }
  .move-dot { width: 14px; height: 14px; }
  .move-queue { gap: 7px; }
  .board { max-width: 480px; }
  .remote-bar { font-size: 1rem; }
  .game-layout { gap: 20px; }

  .game-main {
    display: flex;
    flex-wrap: wrap;
    flex-direction: row;
    justify-content: center;
    align-items: center;
    gap: 14px;
    flex: 1;
    min-width: 0;
  }

  .side-col {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 14px;
    order: 0;
  }

  .board-wrapper {
    order: 1;
    flex: 0 0 100%;
  }
  .connection-badge { order: 2; }

  .board {
    max-width: 480px;
    width: 100%;
  }

  .connection-badge {
    flex-basis: 100%;
  }

  .player-panel.flip {
    transform: none;
  }
}

@media (max-width: 520px) {
  .game-layout { gap: 8px; }

  .player-panel {
    flex: 0 0 auto;
    flex-direction: row;
    width: 100%;
    padding: 6px 10px;
    gap: 12px;
  }

  .player-symbol { width: 28px; height: 28px; }
  .player-symbol.x-sym::before,
  .player-symbol.o-sym::before { width: 22px; height: 22px; border-width: 3px; }
  .player-label { font-size: 0.8rem; }
  .score { font-size: 1.15rem; }
  .move-dot { width: 10px; height: 10px; }
  .move-queue { gap: 6px; }

  .game-main { gap: 2px 4px; }

  .side-btn {
    font-size: 0.8rem;
    padding: 3px 0;
  }

  .status-text { font-size: 0.9rem; }
  #mode-screen h1 { font-size: 4.2rem; }
  .subtitle { font-size: 0.95rem; }
  .modal { padding: 28px 20px; }
  .modal p { font-size: 0.85rem; }
  .modal-btn { font-size: 0.85rem; }
  .modal-btn-sm { font-size: 0.7rem; padding: 5px 12px; }
  .remote-row { gap: 8px; margin-bottom: 14px; }
  .remote-row .icon-btn { flex: 0 0 48px; height: 42px; }
  .remote-row .modal-btn { width: 120px; font-size: 0.82rem; padding: 8px 16px; }
  .remote-row .modal-btn.primary { width: 120px; font-size: 0.82rem; padding: 8px 16px; }
  #room-input { height: 42px; font-size: 1rem; max-width: 200px; }
  .waiting-room-code { font-size: 2rem; }
  .waiting-qr-frame img { width: 160px; height: 160px; }
  .remote-bar { font-size: 0.85rem; }
  .remote-bar .side-btn { font-size: 0.8rem; }

  .board {
    max-width: 340px;
    width: 82vw;
  }

  .screen { padding: 16px 8px 8px; }
  #game-screen { padding: 8px; }

  .subtitle { margin-bottom: 48px; }

  .mode-buttons { max-width: 170px; }
  .mode-btn {
    padding: 10px 14px;
    font-size: 0.85rem;
    line-height: 1.4;
  }
}
</style>
</head>
<body>

<span class="connection-badge" id="conn-badge">
  <span class="dot"></span><span id="conn-label">连接中...</span>
</span>

<noscript>
  <div style="
    padding: 15px; background: #fff0f0; border: 1px solid #ffc0c0;
    color: #b84545; text-align: center; font-size: 0.9rem;
  ">
    <strong>提示：</strong>这是一个简易井字棋游戏。
    您当前的浏览器不支持或未开启 JavaScript，
    请在启用了 JavaScript 的图形浏览器中访问以获得正常游戏体验。
  </div>
</noscript>

<!-- Home screen -->
<div id="mode-screen" class="screen active">
  <h1>水切り</h1>
  <p class="subtitle">余韻を三つ、残せ</p>
  <div class="mode-buttons">
    <button id="btn-local" class="mode-btn primary">双映</button>
    <button id="btn-solo" class="mode-btn">独石</button>
    <button id="btn-remote" class="mode-btn">远波</button>
  </div>
</div>

<!-- Game screen -->
<div id="game-screen" class="screen" data-turn="X">
  <div class="remote-bar" id="remote-bar" style="display:none">
    <span id="remote-bar-room"></span>
    <span class="turn-dot x-turn" id="remote-bar-dot"></span>
    <button class="side-btn btn-back" style="writing-mode:horizontal-tb">返回</button>
    <button
      class="side-btn btn-swap"
      style="writing-mode:horizontal-tb"
      id="btn-swap-remote"
    >易先</button>
    <button class="side-btn btn-reset" style="writing-mode:horizontal-tb">再戦</button>
  </div>

<script type="module">
// @license magnet:?xt=urn:btih:d3d9a9a6595521f9666a5e94cc830dab83b65699&dn=expat.txt Expat

const isLocal = (
  location.hostname === 'localhost' ||
  location.hostname === '127.0.0.1' ||
  !location.hostname
);
const WS_URL = isLocal
  ? 'ws://127.0.0.1:8765'
  : (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/ws';
const WIN_LINES = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

// Game State
const game = {
  board: Array(9).fill(null),
  queues: { X: [], O: [] },
  currentPlayer: 'X',
  winner: null,
  winCells: null,
  scores: { X: 0, O: 0 },
  moveCount: 0,
  gameOver: false
};

// UI and Network State
let gameMode = null; // 'local', 'solo', 'remote'
let isMyTurn = false;
let mySymbol = null; // 'X' or 'O'
let ws = null;
let remoteReady = false;
let remoteRoom = null;
let lastPlaced = -1;
let soloAIFirst = false;
let localXFirst = true;
let remoteFirstSymbol = 'X';

// Navigation & Dialog States
let activeScreen = 'mode-screen'; // 'mode-screen', 'game-screen'
let remoteModalActive = false;
let remoteModalState = 'join'; // 'join', 'waiting'
let confirmActive = false;
let confirmMsg = '';
let confirmCallback = null;

/**
 * GameEngine — 游戏规则引擎实现。
 *
 * 所有对局状态变更必须通过此模块进行。
 * 本模块为纯逻辑：不涉及 DOM、音效、网络，可独立测试。
 *
 * GameState 结构：
 *   board:         Array(9)  null | 'X' | 'O'
 *   queues:        { X: number[], O: number[] }  每方最多 3 个落子，FIFO
 *   currentPlayer: 'X' | 'O'
 *   winner:        null | 'X' | 'O'
 *   winCells:      null | number[3]  获胜的三格索引
 *   scores:        { X: number, O: number }
 *   moveCount:     number  历史总落子数，用于协议同步与音效触发
 *   gameOver:      boolean
 *
 * 不变量：
 *   - queues 中每个索引在 board 上对应的值 === 该玩家符号
 *   - queues 每方长度 ≤ 3
 *   - gameOver === true 时 winner 和 winCells 必定已设置
 *   - 平局在此游戏中不可能发生（FIFO 机制保证），
 *     故 gameOver === true ⇒ winner !== null
 *
 * 协议约定：
 *   server.el 的 mz-game-state-msg 必须包含 GameState 中所有字段，
 *   前端 handleSocketMessage 的 'state' 分支以此结构解构。
 *   两端字段增减须同步修改，参见 mz-game-state-msg 函数。
 */
const GameEngine = {
  /**
   * 创建一个全新的空棋局状态。
   * @param {string} first - 先手方，'X' 或 'O'，默认 'X'
   * @returns {GameState}
   */
  newGame(first = 'X') {
    return {
      board: Array(9).fill(null),
      queues: { X: [], O: [] },
      currentPlayer: first,
      winner: null,
      winCells: null,
      scores: { X: 0, O: 0 },
      moveCount: 0,
      gameOver: false
    };
  },

  /**
   * 检测指定玩家当前是否已获胜。
   * @param {{ X: number[], O: number[] }} queues
   * @param {'X'|'O'} player
   * @returns {number[]|null} 获胜的三格索引，或 null（未获胜）
   * 前置条件：queues[player].length <= 3
   */
  checkWin(queues, player) {
    const q = queues[player];
    if (q.length < 3) return null;
    const s = new Set(q);
    for (const line of WIN_LINES) {
      if (line.every(i => s.has(i))) return line;
    }
    return null;
  },

  /**
   * 在指定位置落子，并处理 FIFO 消子、胜负判定、步数递增。
   * 副作用：修改 game 对象（board、queues、moveCount、winner、
   *         winCells、gameOver、scores、currentPlayer）;
   *         调用 playSound()（可选，不影响逻辑）。
   * @param {GameState} game
   * @param {number} pos  目标格子索引 0–8
   * @returns {boolean} true = 落子成功；false = 不合法（已占用或对局已结束）
   * 前置条件：pos ∈ [0, 8]，game 为合法 GameState
   * 后置条件（成功时）：
   *   - game.board[pos] === 落子方符号
   *   - game.queues[落子方].length <= 3
   *   - game.moveCount 增加 1
   *   - 如有获胜：game.gameOver === true，game.winner 已设置
   *   - 轮换：game.currentPlayer 切换到对方
   */
  applyMove(game, pos) {
    if (game.gameOver || game.board[pos] !== null) return false;
    const p = game.currentPlayer;
    const q = game.queues[p];

    let shifted = false;
    if (q.length >= 3) {
      const old = q.shift();
      if (!q.includes(old)) {
        game.board[old] = null;
      }
      shifted = true;
    }

    q.push(pos);
    game.board[pos] = p;
    game.moveCount++;
    lastPlaced = pos;

    const win = this.checkWin(game.queues, p);
    if (win) {
      game.winner = p;
      game.winCells = win;
      game.gameOver = true;
      game.scores[p]++;
      playSound('win');
    } else {
      playSound('place');
      if (shifted) {
        playSound('remove');
      }
    }

    game.currentPlayer = p === 'X' ? 'O' : 'X';
    return true;
  }
};

/**
 * MinimaxAI — 基于 Alpha-Beta 剪枝的决策引擎。
 *
 * 仅用于本地人机对战，不涉及联机逻辑。
 *
 * @namespace
 */
// Minimax AI
const MinimaxAI = {
  simulateMove(board, queues, player, pos) {
    const nextBoard = [...board];
    const nextQueues = {
      X: [...queues.X],
      O: [...queues.O]
    };
    nextBoard[pos] = player;
    nextQueues[player].push(pos);
    if (nextQueues[player].length > 3) {
      const old = nextQueues[player].shift();
      nextBoard[old] = null;
    }
    const nextPlayer = player === 'X' ? 'O' : 'X';
    return { board: nextBoard, queues: nextQueues, currentPlayer: nextPlayer };
  },

  checkWinForQueues(queues, player) {
    const q = queues[player];
    if (q.length < 3) return false;
    const s = new Set(q);
    for (const line of WIN_LINES) {
      if (line.every(i => s.has(i))) return true;
    }
    return false;
  },

  evaluateBoard(board, queues) {
    let score = 0;
    const setX = new Set(queues.X);
    const setO = new Set(queues.O);
    for (const line of WIN_LINES) {
      const countX = line.filter(i => setX.has(i)).length;
      const countO = line.filter(i => setO.has(i)).length;
      if (countX === 2 && countO === 0) score -= 10;
      if (countO === 2 && countX === 0) score += 10;
      if (countX === 1 && countO === 0) score -= 1;
      if (countO === 1 && countX === 0) score += 1;
    }
    return score;
  },

  minimax(board, queues, currentPlayer, depth, alpha, beta, isMax) {
    const prevPlayer = currentPlayer === 'O' ? 'X' : 'O';
    if (this.checkWinForQueues(queues, prevPlayer)) {
      return prevPlayer === 'O' ? 1000 - depth : -1000 + depth;
    }
    if (depth >= 6) {
      return this.evaluateBoard(board, queues);
    }
    const validMoves = [];
    for (let i = 0; i < 9; i++) {
      if (board[i] === null) validMoves.push(i);
    }
    if (validMoves.length === 0) return 0;

    if (isMax) {
      let maxVal = -Infinity;
      for (const move of validMoves) {
        const next = this.simulateMove(board, queues, 'O', move);
        const val = this.minimax(
          next.board, next.queues, next.currentPlayer,
          depth + 1, alpha, beta, false
        );
        maxVal = Math.max(maxVal, val);
        alpha = Math.max(alpha, val);
        if (beta <= alpha) break;
      }
      return maxVal;
    } else {
      let minVal = Infinity;
      for (const move of validMoves) {
        const next = this.simulateMove(board, queues, 'X', move);
        const val = this.minimax(
          next.board, next.queues, next.currentPlayer,
          depth + 1, alpha, beta, true
        );
        minVal = Math.min(minVal, val);
        beta = Math.min(beta, val);
        if (beta <= alpha) break;
      }
      return minVal;
    }
  },

  getBestMove(board, queues) {
    const validMoves = [];
    for (let i = 0; i < 9; i++) {
      if (board[i] === null) validMoves.push(i);
    }
    if (validMoves.length === 0) return null;
    
    // Shuffle moves to introduce variety
    for (let i = validMoves.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [validMoves[i], validMoves[j]] = [validMoves[j], validMoves[i]];
    }

    let bestVal = -Infinity;
    let bestMove = validMoves[0];
    for (const move of validMoves) {
      const next = this.simulateMove(board, queues, 'O', move);
      const val = this.minimax(
        next.board, next.queues, next.currentPlayer,
        1, -Infinity, Infinity, false
      );
      if (val > bestVal) {
        bestVal = val;
        bestMove = move;
      }
    }
    return bestMove;
  }
};

function resetGame() {
  const saved = { ...game.scores };
  Object.assign(game, GameEngine.newGame(remoteFirstSymbol));
  game.scores = saved;
}

let audioCtx = null;
/**
 * 标记音频子系统是否已出现错误。
 * 设为 true 后不再重试，避免反复抛出异常占用控制台。
 */
let audioErrorLogged = false;

function getAudioContext() {
  if (audioErrorLogged) return null;
  if (!audioCtx) {
    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
    if (AudioContextClass) {
      audioCtx = new AudioContextClass();
    }
  }
  if (audioCtx && audioCtx.state === 'suspended') {
    audioCtx.resume().catch(() => {});
  }
  return audioCtx;
}

/**
 * 播放合成音效。音效不是核心功能，失败时静默降级。
 * 首次失败会向控制台输出诊断信息，之后不再重试。
 * @param {'place'|'remove'|'win'} type
 */
function playSound(type) {
  try {
    const ctx = getAudioContext();
    if (!ctx) {
      if (!audioErrorLogged) {
        console.warn('[Sound] AudioContext unavailable — sound disabled');
        audioErrorLogged = true;
      }
      return;
    }

    if (type === 'place') {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(900, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + 0.12);
      gain.gain.setValueAtTime(0.12, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 0.12);
    } else if (type === 'remove') {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      const delay = 0.08;
      osc.frequency.setValueAtTime(150, ctx.currentTime + delay);
      osc.frequency.exponentialRampToValueAtTime(
        40, ctx.currentTime + delay + 0.25
      );
      gain.gain.setValueAtTime(0.03, ctx.currentTime + delay);
      gain.gain.exponentialRampToValueAtTime(
        0.001, ctx.currentTime + delay + 0.25
      );
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(ctx.currentTime + delay);
      osc.stop(ctx.currentTime + delay + 0.25);
    } else if (type === 'win') {
      const freqs = [523.25, 587.33, 659.25, 783.99, 880.00];
      freqs.forEach((f, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(f, ctx.currentTime + i * 0.08);
        gain.gain.setValueAtTime(0.06, ctx.currentTime + i * 0.08);
        gain.gain.exponentialRampToValueAtTime(
          0.001, ctx.currentTime + i * 0.08 + 1.2
        );
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(ctx.currentTime + i * 0.08);
        osc.stop(ctx.currentTime + i * 0.08 + 1.2);
      });
    }
  } catch (e) {
    console.warn(`[Sound] synthesis failed (${type}):`, e.message);
    audioErrorLogged = true;
  }
}

// Rendering
const $board = document.getElementById('board');
const $cells = $board.querySelectorAll('.cell');
const $statusText = document.getElementById('status-text');
const $gameScreen = document.getElementById('game-screen');
const $panelX = document.getElementById('panel-x');
const $panelO = document.getElementById('panel-o');

function renderAll() {
  updateTurnState();
  updateConnectionBadge();

  // 1. Render screens active state
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.toggle('active', s.id === activeScreen);
  });

  // 2. Render overlays/modals active state
  const remoteModal = document.getElementById('remote-modal');
  remoteModal.classList.toggle('active', remoteModalActive);
  document.getElementById('remote-join').style.display =
    remoteModalState === 'join' ? '' : 'none';
  document.getElementById('remote-waiting').style.display =
    remoteModalState === 'waiting' ? '' : 'none';

  const confirmOverlay = document.getElementById('confirm-overlay');
  confirmOverlay.classList.toggle('active', confirmActive);
  document.getElementById('confirm-msg').textContent = confirmMsg;

  // 3. Render layout visibility and remote bar details
  const remoteBar = document.getElementById('remote-bar');
  const sideCol = document.querySelector('.side-col');
  const sideColRight = document.getElementById('side-col-right');

  if (gameMode === 'local') {
    remoteBar.style.display = 'none';
    $statusText.style.display = '';
    sideCol.style.display = '';
    if (sideColRight) sideColRight.style.display = 'flex';
  } else if (gameMode === 'solo' || gameMode === 'remote') {
    remoteBar.style.display = 'flex';
    $statusText.style.display = 'none';
    sideCol.style.display = 'none';
    if (sideColRight) sideColRight.style.display = 'none';

    if (gameMode === 'solo') {
      document.getElementById('remote-bar-room').textContent = '';
    } else {
      document.getElementById('remote-bar-room').textContent =
        '#' + (remoteRoom || '');
    }
  }

  // 4. Render board grid, score panel, queues, status indicators
  renderBoard();
  renderQueues();
  renderScores();
  renderStatus();
  renderPanels();

  $gameScreen.dataset.turn = game.currentPlayer;
  $gameScreen.dataset.myturn = isMyTurn ? 'true' : 'false';
}

function renderBoard() {
  $cells.forEach(cell => {
    const idx = parseInt(cell.dataset.idx);
    const val = game.board[idx];
    cell.className = 'cell';

    if (val) {
      cell.classList.add('taken', val === 'X' ? 'x-mark' : 'o-mark');
      if (idx === lastPlaced) cell.classList.add('just-placed');
      const q = game.queues[val];
      if (q.length === 3 && q[0] === idx) {
        cell.classList.add(val === 'X' ? 'oldest-x' : 'oldest-o');
      }
    }

    if (game.winCells && game.winCells.includes(idx)) {
      cell.classList.add('win-cell');
    }
  });
  lastPlaced = -1;
}

function renderQueues() {
  [$queueX, $queueO].forEach((container, pi) => {
    const player = pi === 0 ? 'X' : 'O';
    const queue = game.queues[player];
    const dots = container.querySelectorAll('.move-dot');
    dots.forEach((dot, i) => {
      dot.className = 'move-dot';
      if (i < queue.length) {
        dot.classList.add(player === 'X' ? 'filled-x' : 'filled-o');
        if (i === 0 && queue.length === 3) dot.classList.add('oldest');
      }
    });
  });
}

function renderScores() {
  $scoreX.textContent = game.scores.X;
  $scoreO.textContent = game.scores.O;
}

function renderStatus() {
  if (game.gameOver) {
    if (game.winner) {
      const w = game.winner;
      const c = w === 'X' ? 'var(--x-color)' : 'var(--o-color)';
      const shape = w === 'X'
        ? '<span style="display:inline-block;width:14px;height:14px;border:3px solid ' + c + ';vertical-align:middle;animation:piece-in 0.3s ease-out"></span>'
        : '<span style="display:inline-block;width:14px;height:14px;border:3px solid ' + c + ';border-radius:50%;vertical-align:middle;animation:piece-in 0.3s ease-out"></span>';
      $statusText.innerHTML = shape;
      const rightStatus = document.getElementById('status-text-right');
      if (rightStatus) rightStatus.innerHTML = shape;
    }
  } else {
    const p = game.currentPlayer;
    const dc = p === 'X' ? 'x-turn' : 'o-turn';
    if (gameMode === 'remote' || gameMode === 'solo') {
      const barDot = document.getElementById('remote-bar-dot');
      if (barDot) barDot.className = 'turn-dot ' + dc;
    } else {
      $statusText.innerHTML = '<span class="turn-dot ' + dc + '"></span>';
      const rightStatus = document.getElementById('status-text-right');
      if (rightStatus) rightStatus.innerHTML = '<span class="turn-dot ' + dc + '"></span>';
    }
  }
}

function renderPanels() {
  const current = game.currentPlayer;
  const isWinnerX = game.winner === 'X';
  const isWinnerO = game.winner === 'O';

  $panelX.classList.toggle('inactive', current !== 'X' && !isWinnerX);
  $panelO.classList.toggle('inactive', current !== 'O' && !isWinnerO);
  $panelX.classList.toggle('win', isWinnerX);
  $panelO.classList.toggle('win', isWinnerO);

  if (gameMode === 'solo') {
    $panelX.classList.remove('flip');
    $panelO.classList.add('flip');
  } else if (gameMode === 'remote') {
    const flipX = mySymbol === 'O';
    $panelX.classList.toggle('flip', flipX);
    $panelO.classList.toggle('flip', !flipX);
  } else {
    $panelX.querySelector('.player-symbol').className =
      'player-symbol x-sym';
    $panelO.querySelector('.player-symbol').className =
      'player-symbol o-sym';
    $panelX.classList.remove('flip');
    $panelO.classList.add('flip');
  }

  // Label text
  if (gameMode === 'local') {
    $labelX.textContent = localXFirst ? '先手' : '后手';
    $labelO.textContent = localXFirst ? '后手' : '先手';
  } else if (gameMode === 'solo') {
    $labelX.textContent = '你 · ' + (soloAIFirst ? '后手' : '先手');
    $labelO.textContent = '石 · ' + (soloAIFirst ? '先手' : '后手');
  } else if (gameMode === 'remote') {
    const isXFirst = remoteFirstSymbol === 'X';
    $labelX.textContent =
      (mySymbol === 'X' ? '你' : '彼') + ' · ' + (isXFirst ? '先手' : '后手');
    $labelO.textContent =
      (mySymbol === 'O' ? '你' : '彼') + ' · ' + (isXFirst ? '后手' : '先手');
  }
}

function toggleStartingPlayer() {
  if (gameMode === 'remote') {
    sendSocketMessage({ type: 'swap' });
    return;
  }

  if (gameMode === 'local') {
    localXFirst = !localXFirst;
    Object.assign(game, GameEngine.newGame(localXFirst ? 'X' : 'O'));
  }
  if (gameMode === 'solo') {
    soloAIFirst = !soloAIFirst;
    Object.assign(game, GameEngine.newGame(soloAIFirst ? 'O' : 'X'));
  }

  renderAll();
  if (gameMode === 'solo' && game.currentPlayer === 'O') {
    setTimeout(aiMove, 600);
  }
}

function startLocal() {
  gameMode = 'local';
  mySymbol = null;
  isMyTurn = true;
  localXFirst = true;
  Object.assign(game, GameEngine.newGame('X'));
  activeScreen = 'game-screen';
  renderAll();
}

function startSolo() {
  gameMode = 'solo';
  mySymbol = 'X';
  isMyTurn = !soloAIFirst;
  Object.assign(game, GameEngine.newGame(soloAIFirst ? 'O' : 'X'));
  activeScreen = 'game-screen';
  renderAll();
  if (soloAIFirst) {
    setTimeout(aiMove, 600);
  }
}

function aiMove() {
  if (gameMode !== 'solo' || game.gameOver || game.currentPlayer !== 'O') return;
  const best = MinimaxAI.getBestMove(game.board, game.queues);
  if (best !== null) {
    GameEngine.applyMove(game, best);
    renderAll();
  }
}

function backToMenu() {
  if (gameMode === 'remote' && remoteReady) {
    showConfirm('退出将关闭房间，确定吗？', () => {
      sendSocketMessage({ type: 'leave' });
      disconnectWebSocket();
      resetToMainMenu();
    });
    return;
  }
  resetToMainMenu();
}

function resetToMainMenu() {
  gameMode = null;
  mySymbol = null;
  activeScreen = 'mode-screen';
  renderAll();
}

// Remote (WebSocket)
function disconnectWebSocket() {
  if (ws) { try { ws.close(); } catch(e) {} ws = null; }
  remoteReady = false;
}

function sendSocketMessage(data) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(data));
  }
}

function handleSocketMessage(msg) {
  switch (msg.type) {
    case 'created':
      remoteRoom = msg.code;
      document.getElementById('room-code-display').textContent = msg.code;
      document.getElementById('qr-img').src = msg.qr;
      document.getElementById('qr-img').style.visibility = 'visible';
      break;

    case 'start':
      gameMode = msg.mode;
      mySymbol = msg.player;
      remoteReady = true;
      remoteModalActive = false;
      resetGame();
      activeScreen = 'game-screen';
      renderAll();
      break;

    case 'state':
      const prevWinner = game.winner;
      const prevMoveCount = game.moveCount;
      const lenX = game.queues.X ? game.queues.X.length : 0;
      const lenO = game.queues.O ? game.queues.O.length : 0;
      const prevQueuesLength = lenX + lenO;

      game.board = msg.board;
      game.queues = msg.queues;
      game.currentPlayer = msg.current;
      game.winner = msg.winner;
      game.winCells = msg.winCells;
      game.scores = msg.scores;
      game.gameOver = msg.gameOver;
      game.moveCount = msg.moveCount;
      if (msg.swapped !== undefined) {
        remoteFirstSymbol = msg.swapped ? 'O' : 'X';
      }

      if (game.moveCount > prevMoveCount) {
        if (game.winner) {
          playSound('win');
        } else {
          const newLenX = game.queues.X ? game.queues.X.length : 0;
          const newLenO = game.queues.O ? game.queues.O.length : 0;
          const newQueuesLength = newLenX + newLenO;
          const shifted = newQueuesLength <= prevQueuesLength;
          playSound('place');
          if (shifted) {
            playSound('remove');
          }
        }
      }
      renderAll();
      break;

    case 'rejected':
      // Server rejected our move (e.g. race condition or stale state).
      // Restore turn so the player can try again without a page reload.
      isMyTurn = true;
      break;

    case 'opponent_left':
      showToast('对手已断开连接');
      break;

    case 'room_closed':
      showToast('对局已结束或房间已关闭');
      backToMenu();
      break;

    case 'error':
      showToast(msg.msg);
      break;
  }
}

function createRemoteRoom() {
  remoteModalState = 'waiting';
  connectWebSocket('create');
  renderAll();
}

function joinRemoteRoom() {
  const code = document.getElementById('room-input').value.trim();
  if (!/^\d{4}$/.test(code)) { showToast('请输入 4 位数字对局码'); return; }
  remoteRoom = code;
  connectWebSocket('join', code);
}

/** 当前 WebSocket 重连次数，正常连接后重置为 0。 */
let reconnectAttempts = 0;
const MAX_RECONNECT = 3;

/** 当前 connectWebSocket 调用时传入的参数，用于重连时复用。 */
let _wsAction = null;
let _wsCode = null;

/**
 * 建立 WebSocket 连接，并在非正常断开时自动指数退避重连（最多 MAX_RECONNECT 次）。
 * @param {'create'|'join'} action - 连接后要执行的操作
 * @param {string} [code] - 加入房间时提供的房间号
 */
function connectWebSocket(action, code) {
  disconnectWebSocket();
  _wsAction = action;
  _wsCode = code;
  const socket = new WebSocket(WS_URL);
  ws = socket;
  updateConnectionBadge();

  socket.onmessage = (e) => {
    try { handleSocketMessage(JSON.parse(e.data)); } catch(ex) {
      console.warn('[WS] Failed to parse message:', ex.message);
    }
  };

  socket.onclose = (event) => {
    updateConnectionBadge();
    remoteReady = false;
    renderAll();
    // 正常关闭（code 1000）或已在菜单则不重连
    const shouldReconnect =
      event.code !== 1000 &&
      gameMode === 'remote' &&
      reconnectAttempts < MAX_RECONNECT;
    if (shouldReconnect) {
      reconnectAttempts++;
      const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 8000);
      console.warn(
        `[WS] Closed (code=${event.code}), reconnecting in ${delay}ms` +
        ` (${reconnectAttempts}/${MAX_RECONNECT})`
      );
      setTimeout(() => connectWebSocket(_wsAction, _wsCode), delay);
    } else if (reconnectAttempts >= MAX_RECONNECT) {
      console.warn('[WS] Max reconnect attempts reached, giving up.');
      showToast('连接失败，请检查网络后刷新重试');
    }
  };

  socket.onerror = (err) => {
    console.warn('[WS] Connection error:', err.type);
    updateConnectionBadge();
    showToast('连接失败，请重试');
  };

  socket.onopen = () => {
    reconnectAttempts = 0;
    updateConnectionBadge();
    renderAll();
    if (action === 'create') sendSocketMessage({ type: 'create' });
    else sendSocketMessage({ type: 'join', code: code });
  };
}

function updateConnectionBadge() {
  const $badge = document.getElementById('conn-badge');
  const $label = document.getElementById('conn-label');
  const $dot = $badge.querySelector('.dot');

  if (gameMode === 'remote' || remoteModalActive) {
    $badge.style.display = 'flex';
  } else {
    $badge.style.display = 'none';
    return;
  }

  if (ws && ws.readyState === WebSocket.OPEN) {
    $dot.style.background = '#6b9e6b'; // Green
    $label.textContent = remoteReady ? '已连接' : '等待对手...';
  } else if (ws && ws.readyState === WebSocket.CONNECTING) {
    $dot.style.background = '#d9a75d'; // Orange
    $label.textContent = '连接中...';
  } else {
    $dot.style.background = '#b84545'; // Red
    $label.textContent = '断开连接';
  }
}

function showRemoteModal() {
  remoteModalActive = true;
  remoteModalState = 'join';
  document.getElementById('room-input').value = '';
  renderAll();
}

function closeRemoteModal() {
  disconnectWebSocket();
  remoteModalActive = false;
  renderAll();
}

async function startQRScanner() {
  const existing = document.getElementById('qr-scanner-overlay');
  if (existing) { existing.remove(); return; }
  loadJSQR(() => startCameraStream());
}

async function startCameraStream() {
  const overlay = document.createElement('div');
  overlay.id = 'qr-scanner-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;z-index:200;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center';
  overlay.innerHTML = '<video id="qr-video" style="width:100%;max-width:400px" autoplay playsinline></video><canvas id="qr-canvas" style="display:none"></canvas><button id="qr-close" style="position:absolute;top:20px;right:20px;background:none;border:none;color:#fff;font-size:1.5rem;cursor:pointer;font-family:inherit">&times;</button>';
  document.body.appendChild(overlay);

  let stream;
  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false }).then(s => {
    stream = s;
    const video = document.getElementById('qr-video');
    video.srcObject = s;
    video.play();

    const canvas = document.getElementById('qr-canvas');
    const ctx = canvas.getContext('2d');
    let scanning = true;

    document.getElementById('qr-close').onclick = () => {
      scanning = false;
      stream.getTracks().forEach(t => t.stop());
      overlay.remove();
    };

    function scanFrame() {
      if (!scanning) return;
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.height = video.videoHeight;
        canvas.width = video.videoWidth;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imgData.data, imgData.width, imgData.height, {
          inversionAttempts: 'dontInvert',
        });
        if (code) {
          const m = code.data.match(/[?&]room=(\d{4})/);
          if (m) {
            scanning = false;
            onRoomFound(m[1]);
            stream.getTracks().forEach(t => t.stop());
            overlay.remove();
            return;
          }
        }
      }
      requestAnimationFrame(scanFrame);
    }
    requestAnimationFrame(scanFrame);
  }).catch(() => {
    overlay.remove();
    showToast('无法启动摄像头');
  });
}

function loadJSQR(cb) {
  if (window.jsQR) { cb(); return; }
  const s = document.createElement('script');
  s.src = './jsQR.min.js';
  s.onload = cb;
  s.onerror = () => showToast('扫码库加载失败');
  document.head.appendChild(s);
}

function onRoomFound(roomCode) {
  showRemoteModal();
  document.getElementById('room-input').value = roomCode;
  joinRemoteRoom();
}

function showConfirm(msg, cb) {
  confirmMsg = msg;
  confirmCallback = cb;
  confirmActive = true;
  renderAll();
}

function closeConfirm(ok) {
  confirmActive = false;
  renderAll();
  if (ok && confirmCallback) confirmCallback();
  confirmCallback = null;
}

function showToast(msg) {
  const el = document.createElement('div');
  el.className = 'copy-notify';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2000);
}

function updateTurnState() {
  if (game.gameOver) {
    isMyTurn = false;
  } else if (gameMode === 'local') {
    isMyTurn = true;
  } else if (gameMode === 'solo') {
    isMyTurn = game.currentPlayer === 'X';
  } else if (gameMode === 'remote') {
    isMyTurn = game.currentPlayer === mySymbol;
  } else {
    isMyTurn = false;
  }
}

function requestReset() {
  if (gameMode === 'remote') {
    sendSocketMessage({ type: 'reset' });
    return;
  }

  const first = gameMode === 'local'
    ? (localXFirst ? 'X' : 'O')
    : (soloAIFirst ? 'O' : 'X');

  const savedScores = { ...game.scores };
  Object.assign(game, GameEngine.newGame(first));
  game.scores = savedScores;

  renderAll();
  if (gameMode === 'solo' && game.currentPlayer === 'O') {
    setTimeout(aiMove, 600);
  }
}

// Event Listeners
document.getElementById('btn-local').addEventListener('click', startLocal);
document.getElementById('btn-solo').addEventListener('click', startSolo);
document.getElementById('btn-remote').addEventListener('click', showRemoteModal);

document.querySelectorAll('.btn-back').forEach(btn => {
  btn.addEventListener('click', backToMenu);
});
document.querySelectorAll('.btn-swap').forEach(btn => {
  btn.addEventListener('click', toggleStartingPlayer);
});
document.querySelectorAll('.btn-reset').forEach(btn => {
  btn.addEventListener('click', requestReset);
});

document.getElementById('btn-scan-qr').addEventListener('click', startQRScanner);
document.getElementById('btn-create-remote').addEventListener('click', createRemoteRoom);
document.getElementById('btn-join-remote').addEventListener('click', joinRemoteRoom);
document.getElementById('btn-cancel-remote').addEventListener('click', closeRemoteModal);

document.getElementById('btn-confirm-cancel').addEventListener('click', () => closeConfirm(false));
document.getElementById('btn-confirm-ok').addEventListener('click', () => closeConfirm(true));

$board.addEventListener('click', (e) => {
  const cell = e.target.closest('.cell');
  if (!cell) return;
  if (game.gameOver) return;
  if (!isMyTurn) return;

  // Prime the AudioContext on user interaction to enable async sound playback
  getAudioContext();

  const idx = parseInt(cell.dataset.idx);
  if (game.board[idx] !== null) return;

  if (gameMode === 'remote') {
    sendSocketMessage({ type: 'move', position: idx });
    isMyTurn = false;
    return;
  }

  if (GameEngine.applyMove(game, idx)) {
    renderAll();
    if (gameMode === 'solo' && !game.gameOver) {
      isMyTurn = false;
      setTimeout(aiMove, 600);
    }
  }
});

(function() {
  const p = new URLSearchParams(location.search);
  const room = p.get('room');
  if (room && /^\d{4}$/.test(room)) {
    showRemoteModal();
    document.getElementById('room-input').value = room;
    joinRemoteRoom();
  }
})();

renderAll();
